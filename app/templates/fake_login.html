<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Authentification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg: #09090b;
            --surface: #0f0f12;
            --border: #1f1f27;
            --text: #d4d4d8;
            --text-muted: #52525b;
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-size: 14px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 32px;
            width: 340px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin: 0 0 5px;
        }

        .card-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0 0 24px;
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        input {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: #3f3f46;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        button:hover { opacity: 0.85; }

        .error {
            margin-top: 14px;
            font-size: 13px;
            color: #f87171;
            padding: 8px 12px;
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.18);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="card-title">Authentification</h1>
        <p class="card-sub">Accès restreint — Honeypot Admin</p>
        <form method="post" action="/login">
            <div class="field">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username" placeholder="username" required autocomplete="username">
            </div>
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit">Connexion</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
